name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url || steps.deploy-retry.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Skip if not latest commit
        id: check
        run: |
          git fetch origin main --quiet
          HEAD=$(git rev-parse HEAD)
          LATEST=$(git rev-parse origin/main)
          if [ "$HEAD" != "$LATEST" ]; then
            echo "Newer commit exists ($LATEST), skipping deploy."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/configure-pages@v5
        if: steps.check.outputs.skip == 'false'
      - uses: actions/upload-pages-artifact@v3
        if: steps.check.outputs.skip == 'false'
        with:
          path: '.'
      - id: deploy
        if: steps.check.outputs.skip == 'false'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Wait before retry
        if: steps.check.outputs.skip == 'false' && steps.deploy.outcome == 'failure'
        run: |
          echo "Deploy failed, waiting 60s before retry..."
          sleep 60
      - id: deploy-retry
        if: steps.check.outputs.skip == 'false' && steps.deploy.outcome == 'failure'
        uses: actions/deploy-pages@v4
